name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: siterag
          POSTGRES_PASSWORD: siterag
          POSTGRES_DB: siterag
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U siterag"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgres://siterag:siterag@localhost:5432/siterag
      REDIS_URL: redis://localhost:6379
      DB_SYNCHRONIZE: 'true'
      EMBED_MODE: thin-server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --omit=optional
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:cov
      - run: npm run build
      - name: e2e contract tests
        run: npm run test:e2e

  docker:
    name: build backend image
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: siterag-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
